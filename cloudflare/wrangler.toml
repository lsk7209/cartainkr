name = "cartainkr-api"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[vars]
INDEXNOW_KEY = "7f4e2b9d1a8c3f6e0d5b4a2c7e9f1d3b"

# Cron triggers for blog post auto-generation
# Schedule: every 12 hours (posts_per_day=2 default)
[[triggers.crons]]
crons = ["0 1,13 * * *"]

# Secrets (set via: wrangler secret put <NAME>)
# TURSO_URL = "https://cartain-lsk7209.aws-ap-northeast-1.turso.io"
# TURSO_TOKEN = "<jwt>"
# ANTHROPIC_API_KEY = "<key>"
# ADMIN_API_KEY = "<your-secret-key>"
