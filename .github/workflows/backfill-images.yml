name: Backfill Post Thumbnails

on:
  workflow_dispatch:
    inputs:
      limit:
        description: '처리할 최대 포스트 수 (0=전체)'
        required: false
        default: '0'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests replicate

      - name: Run backfill
        working-directory: scripts
        run: python backfill_images.py --limit ${{ github.event.inputs.limit || '0' }}
        env:
          CARTAIN_TOKEN:             ${{ secrets.CARTAIN_TOKEN }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN:       ${{ secrets.REPLICATE_API_TOKEN }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
