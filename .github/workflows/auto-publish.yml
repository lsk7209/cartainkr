name: Auto Publish Article

on:
  schedule:
    # 매 5시간마다 실행 (UTC 기준: 0, 5, 10, 15, 20시)
    - cron: '0 */5 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 (Actions 탭에서 즉시 테스트 가능)

concurrency:
  group: auto-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests replicate

      - name: Publish article
        run: python scripts/auto_publish.py
        env:
          CARTAIN_TOKEN:             ${{ secrets.CARTAIN_TOKEN }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          VERCEL_DEPLOY_HOOK:        ${{ secrets.VERCEL_DEPLOY_HOOK }}
          REPLICATE_API_TOKEN:       ${{ secrets.REPLICATE_API_TOKEN }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLISH_INTERVAL_HOURS:    "5"
